<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<title>Pong Gyro 3D</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0d0d0d;
    --accent:#e0ff4f;
    --dim:#444455;
    --white:#f0f0f0;
    --danger:#ff4f4f;
  }
  html,body { width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Courier New',monospace;touch-action:none;user-select:none; }

  #c { position:fixed;top:0;left:0;width:100%;height:100%;display:block; }

  .screen {
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1.8rem;padding:2rem;
    text-align:center;z-index:10;background:rgba(13,13,13,0.92);
    backdrop-filter:blur(4px);transition:opacity .3s;
  }
  .screen.hidden{opacity:0;pointer-events:none;}

  .title{font-size:clamp(2.5rem,11vw,4.5rem);font-weight:900;letter-spacing:-.02em;color:var(--accent);line-height:.9;}
  .subtitle{font-size:clamp(.7rem,3vw,.9rem);color:var(--dim);letter-spacing:.18em;text-transform:uppercase;}
  .best-label{font-size:clamp(.65rem,2.8vw,.85rem);color:var(--dim);letter-spacing:.1em;}
  .best-value{font-size:clamp(1.4rem,6vw,2.2rem);color:var(--white);font-weight:700;}

  .btn{background:var(--accent);color:#0d0d0d;border:none;padding:.9rem 2.2rem;font-family:inherit;font-size:clamp(.85rem,3.8vw,1rem);font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:transform .1s;-webkit-tap-highlight-color:transparent;width:100%;max-width:280px;}
  .btn:active{transform:scale(.96);}
  .btn.sec{background:transparent;color:var(--dim);border:1px solid var(--dim);font-size:clamp(.7rem,3vw,.85rem);}
  .hint{font-size:clamp(.65rem,2.8vw,.8rem);color:var(--dim);max-width:260px;line-height:1.7;}
  .version{font-size:clamp(.6rem,2.5vw,.75rem);color:var(--dim);letter-spacing:.2em;margin-top:.35rem;opacity:.6;}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.4rem;pointer-events:none;z-index:5;}
  #hud.hidden{display:none;}
  .hud-label{font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);}
  .hud-value{font-size:clamp(1.3rem,5.5vw,1.9rem);font-weight:900;color:var(--accent);line-height:1;}
  .hud-value.rec{color:var(--dim);font-size:clamp(.9rem,3.8vw,1.3rem);}

  #flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(2rem,9vw,3rem);font-weight:900;color:var(--accent);pointer-events:none;z-index:6;opacity:0;transition:opacity .1s;letter-spacing:-.02em;}

  #sbar{position:fixed;bottom:0;left:0;right:0;height:3px;background:#1a1a1a;z-index:5;pointer-events:none;}
  #sfill{height:100%;background:var(--accent);width:0%;transition:width .3s,background .3s;}
  #sbar.hidden{display:none;}

  #finalScore{font-size:clamp(3rem,14vw,5.5rem);font-weight:900;color:var(--accent);line-height:1;}
  #newRecord{font-size:clamp(.75rem,3.2vw,.95rem);color:var(--danger);letter-spacing:.1em;text-transform:uppercase;font-weight:700;min-height:1.2em;}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- ACCUEIL -->
<div id="sHome" class="screen">
  <div><div class="title">PONG<br>GYRO</div><div class="subtitle">3D · Coopératif · 2 joueurs</div><div class="version">v2.1</div></div>
  <div><div class="best-label">Meilleur score</div><div class="best-value" id="homeBest">0</div></div>
  <div style="display:flex;flex-direction:column;gap:.8rem;width:100%;max-width:280px">
    <button class="btn" id="btnStart">Jouer</button>
    <button class="btn sec" id="btnIOS" style="display:none">Autoriser le gyroscope (iOS)</button>
  </div>
  <div class="hint">Tenez le téléphone à deux mains.<br>Inclinez ensemble pour bouger les raquettes.</div>
</div>

<!-- GAME OVER -->
<div id="sOver" class="screen hidden">
  <div><div class="best-label">Échanges réussis</div><div id="finalScore">0</div><div id="newRecord"></div></div>
  <div style="display:flex;flex-direction:column;gap:.8rem;width:100%;max-width:280px">
    <button class="btn" id="btnReplay">Rejouer</button>
    <button class="btn sec" id="btnHome">Accueil</button>
  </div>
</div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-block"><div class="hud-label">Record</div><div class="hud-value rec" id="hudBest">0</div></div>
  <div class="hud-block"><div class="hud-label">Échanges</div><div class="hud-value" id="hudScore">0</div></div>
</div>

<div id="flash"></div>
<div id="sbar" class="hidden"><div id="sfill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const TW = 14;       // largeur table
const TL = 22;       // longueur table
const PW = 4.2;      // largeur raquette
const PD = 0.35;     // profondeur raquette
const PH = 0.18;     // épaisseur raquette
const BR = 0.22;     // rayon balle
const NET_H = 0.28;  // hauteur filet
const PMARG = 2.2;   // marge raquette depuis bord
const GYRO_SENS = 3.8;
const GYRO_SMOOTH = 0.10;
const SPEED_INIT = 0.09;
const SPEED_INC  = 0.0012;
const SPEED_MAX  = 0.28;
const COMBOS = [5,10,20,30,50,75,100];

// ═══════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x0d0d0d);

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x0d0d0d, 30, 55);

// Caméra — vue quasi-dessus légèrement inclinée
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
// Portrait mobile : on recule plus
function setCameraForAspect() {
  const asp = window.innerWidth / window.innerHeight;
  if (asp < 1) {
    // Portrait
    camera.position.set(0, 26, 13);
  } else {
    // Paysage
    camera.position.set(0, 20, 9);
  }
  camera.lookAt(0, 0, 0);
  camera.updateProjectionMatrix();
}

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  setCameraForAspect();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 200));
onResize();

// ═══════════════════════════════════════
//  LUMIÈRES
// ═══════════════════════════════════════
const ambient = new THREE.AmbientLight(0xffffff, 0.45);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xfff8e8, 1.1);
dirLight.position.set(4, 16, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far  = 60;
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 16;
dirLight.shadow.camera.bottom = -16;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Lumière d'appoint douce de bas
const fillLight = new THREE.DirectionalLight(0xaaccff, 0.2);
fillLight.position.set(-3, 5, -6);
scene.add(fillLight);

// ═══════════════════════════════════════
//  TABLE
// ═══════════════════════════════════════

// Surface principale — texture bois procédurale via canvas
function makeWoodTexture() {
  const size = 512;
  const cv = document.createElement('canvas');
  cv.width = cv.height = size;
  const cx = cv.getContext('2d');

  // Base bois vert foncé (table de ping-pong)
  const base = cx.createLinearGradient(0, 0, size, size);
  base.addColorStop(0,   '#1a4a1a');
  base.addColorStop(0.3, '#1e5220');
  base.addColorStop(0.6, '#174517');
  base.addColorStop(1,   '#1b4c1b');
  cx.fillStyle = base;
  cx.fillRect(0, 0, size, size);

  // Veines bois subtiles
  for (let i = 0; i < 18; i++) {
    const y = Math.random() * size;
    const grad = cx.createLinearGradient(0, y-2, size, y+2);
    grad.addColorStop(0,   'rgba(0,0,0,0)');
    grad.addColorStop(0.2, 'rgba(0,0,0,0.07)');
    grad.addColorStop(0.5, 'rgba(0,0,0,0.12)');
    grad.addColorStop(0.8, 'rgba(0,0,0,0.07)');
    grad.addColorStop(1,   'rgba(0,0,0,0)');
    cx.fillStyle = grad;
    cx.fillRect(0, y-3, size, 6);
  }

  // Reflet central
  const shine = cx.createRadialGradient(size*.5, size*.5, 10, size*.5, size*.5, size*.6);
  shine.addColorStop(0,   'rgba(255,255,255,0.06)');
  shine.addColorStop(1,   'rgba(255,255,255,0)');
  cx.fillStyle = shine;
  cx.fillRect(0, 0, size, size);

  return new THREE.CanvasTexture(cv);
}

const tableGeo = new THREE.BoxGeometry(TW, 0.18, TL);
const tableMat = new THREE.MeshLambertMaterial({ map: makeWoodTexture() });
const tableMesh = new THREE.Mesh(tableGeo, tableMat);
tableMesh.position.y = -0.09;
tableMesh.receiveShadow = true;
scene.add(tableMesh);

// Bordure table
const edgeMat = new THREE.MeshLambertMaterial({ color: 0x8B5E1A });
[[TW+.06, 0.22, 0.28, 0, 0, TL/2+.14],[TW+.06, 0.22, 0.28, 0, 0, -TL/2-.14],
 [0.28, 0.22, TL, TW/2+.14, 0, 0],  [0.28, 0.22, TL, -TW/2-.14, 0, 0]
].forEach(([w,h,d,x,y,z]) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), edgeMat);
  m.position.set(x, y, z);
  m.receiveShadow = true;
  scene.add(m);
});

// Lignes blanches sur la table
function addLine(w, d, x, z) {
  const geo = new THREE.PlaneGeometry(w, d);
  const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 });
  const m = new THREE.Mesh(geo, mat);
  m.rotation.x = -Math.PI / 2;
  m.position.set(x, 0.01, z);
  scene.add(m);
}
// Ligne centrale
addLine(TW - 0.3, 0.06, 0, 0);
// Lignes de fond
addLine(TW - 0.3, 0.06, 0,  TL/2 - 0.3);
addLine(TW - 0.3, 0.06, 0, -TL/2 + 0.3);
// Ligne médiane longitudinale
addLine(0.06, TL - 0.3, 0, 0);

// ═══════════════════════════════════════
//  FILET
// ═══════════════════════════════════════
const netGroup = new THREE.Group();

// Poteau gauche et droit
[TW/2 + 0.1, -TW/2 - 0.1].forEach(x => {
  const p = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, NET_H + 0.1, 8),
    new THREE.MeshLambertMaterial({ color: 0xcccccc })
  );
  p.position.set(x, NET_H/2, 0);
  p.castShadow = true;
  netGroup.add(p);
});

// Filet (grille fine)
const netMat = new THREE.MeshLambertMaterial({ color: 0xdddddd, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
// Plan principal filet
const netMesh = new THREE.Mesh(new THREE.PlaneGeometry(TW + 0.2, NET_H), netMat);
netMesh.position.set(0, NET_H/2, 0);
netMesh.castShadow = true;
netGroup.add(netMesh);

// Bande blanche haut du filet
const topBand = new THREE.Mesh(
  new THREE.BoxGeometry(TW + 0.3, 0.05, 0.04),
  new THREE.MeshLambertMaterial({ color: 0xffffff })
);
topBand.position.set(0, NET_H + 0.025, 0);
netGroup.add(topBand);

scene.add(netGroup);

// ═══════════════════════════════════════
//  RAQUETTES
// ═══════════════════════════════════════
function makePaddle(color) {
  const g = new THREE.Group();
  // Corps principal
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(PW, PH, PD),
    new THREE.MeshLambertMaterial({ color })
  );
  body.castShadow = true;
  g.add(body);
  // Tranche blanche
  const edge = new THREE.Mesh(
    new THREE.BoxGeometry(PW + 0.02, PH * 0.4, 0.04),
    new THREE.MeshLambertMaterial({ color: 0xffffff })
  );
  edge.position.z = PD/2 + 0.02;
  g.add(edge);
  return g;
}

const paddleBot = makePaddle(0xe03030); // rouge joueur bas
const paddleTop = makePaddle(0x3060e0); // bleu joueur haut
paddleBot.position.set(0, PH/2 + 0.01,  TL/2 - PMARG);
paddleTop.position.set(0, PH/2 + 0.01, -TL/2 + PMARG);
scene.add(paddleBot);
scene.add(paddleTop);

// ═══════════════════════════════════════
//  BALLE
// ═══════════════════════════════════════
const ballGeo = new THREE.SphereGeometry(BR, 20, 20);
const ballMat = new THREE.MeshLambertMaterial({ color: 0xf5f5e8 });
const ballMesh = new THREE.Mesh(ballGeo, ballMat);
ballMesh.castShadow = true;
scene.add(ballMesh);

// Ombre projetée au sol (cercle plat)
const shadowGeo = new THREE.CircleGeometry(BR * 0.8, 16);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.35 });
const ballShadow = new THREE.Mesh(shadowGeo, shadowMat);
ballShadow.rotation.x = -Math.PI/2;
ballShadow.position.y = 0.005;
scene.add(ballShadow);

// Halo léger sous la balle
const haloGeo = new THREE.CircleGeometry(BR * 1.8, 16);
const haloMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06 });
const ballHalo = new THREE.Mesh(haloGeo, haloMat);
ballHalo.rotation.x = -Math.PI/2;
ballHalo.position.y = 0.004;
scene.add(ballHalo);

// ═══════════════════════════════════════
//  ÉTAT JEU
// ═══════════════════════════════════════
let gameActive = false;
let score = 0;
let bestScore = parseInt(localStorage.getItem('pongGyro3DBest') || '0');
let ballVX = 0, ballVZ = 0;
let ballX = 0, ballZ = 0;
let speedBase = SPEED_INIT;
let gyroRaw = 0, gyroSmoothed = 0;
let gyroOK = false;
let animId;

// ═══════════════════════════════════════
//  GYROSCOPE
// ═══════════════════════════════════════
window.addEventListener('deviceorientation', e => {
  if (e.gamma !== null) gyroRaw = e.gamma;
});

function requestGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(r => { if (r === 'granted') gyroOK = true; })
      .catch(console.error);
  } else {
    gyroOK = true;
  }
}

// ═══════════════════════════════════════
//  INIT PARTIE
// ═══════════════════════════════════════
function initGame() {
  score = 0;
  speedBase = SPEED_INIT;
  gyroSmoothed = 0;
  ballX = 0;
  ballZ = 0;

  const angle = (Math.random() * 0.5 + 0.25) * Math.PI;
  const sign  = Math.random() < 0.5 ? 1 : -1;
  ballVX = Math.cos(angle) * speedBase * (Math.random() < 0.5 ? 1 : -1);
  ballVZ = Math.sin(angle) * speedBase * sign;

  updateBallMesh();
  updatePaddleMesh(0);
  updateHUD();
}

function updateBallMesh() {
  ballMesh.position.set(ballX, BR + 0.01, ballZ);
  ballShadow.position.x = ballX;
  ballShadow.position.z = ballZ;
  ballHalo.position.x = ballX;
  ballHalo.position.z = ballZ;
}

function updatePaddleMesh(px) {
  paddleBot.position.x = px;
  paddleTop.position.x = px;
}

// ═══════════════════════════════════════
//  LOGIQUE JEU
// ═══════════════════════════════════════
function update() {
  if (!gameActive) return;

  // Gyro → mouvement raquettes
  gyroSmoothed += (gyroRaw - gyroSmoothed) * GYRO_SMOOTH;
  const move = gyroSmoothed * GYRO_SENS * 0.02;
  let px = paddleBot.position.x + move;
  const halfField = TW/2 - PW/2;
  px = Math.max(-halfField, Math.min(halfField, px));
  updatePaddleMesh(px);

  // Mouvement balle
  ballX += ballVX;
  ballZ += ballVZ;

  // Rebond murs gauche/droite
  const wallX = TW/2 - BR;
  if (ballX < -wallX) { ballX = -wallX; ballVX = Math.abs(ballVX); }
  if (ballX >  wallX) { ballX =  wallX; ballVX = -Math.abs(ballVX); }

  // Collision raquette BAS (Z positif)
  const botZ = paddleBot.position.z;
  if (ballVZ > 0 &&
      ballZ + BR >= botZ - PD/2 &&
      ballZ - BR <= botZ + PD/2 &&
      ballX >= px - PW/2 &&
      ballX <= px + PW/2) {
    hitPaddle(px, 'bot');
  }

  // Collision raquette HAUT (Z négatif)
  const topZ = paddleTop.position.z;
  if (ballVZ < 0 &&
      ballZ - BR <= topZ + PD/2 &&
      ballZ + BR >= topZ - PD/2 &&
      ballX >= px - PW/2 &&
      ballX <= px + PW/2) {
    hitPaddle(px, 'top');
  }

  // Balle sort du terrain
  if (ballZ > TL/2 + 1 || ballZ < -TL/2 - 1) {
    endGame();
    return;
  }

  updateBallMesh();

  // Rotation légère de la balle (cosmétique)
  ballMesh.rotation.x += ballVZ * 0.4;
  ballMesh.rotation.z -= ballVX * 0.4;
}

function hitPaddle(px, side) {
  score++;
  speedBase = Math.min(SPEED_INIT + score * SPEED_INC, SPEED_MAX);

  const rel = (ballX - (px - PW/2)) / PW;
  const clamped = Math.max(0.05, Math.min(0.95, rel));
  const maxAngle = 65 * Math.PI / 180;
  const angle = (clamped - 0.5) * 2 * maxAngle;

  const spd = speedBase;
  ballVX = Math.sin(angle) * spd;
  ballVZ = side === 'bot' ? -Math.cos(angle) * spd : Math.cos(angle) * spd;

  // Repositionnement anti-double-hit
  const pz = side === 'bot' ? paddleBot.position.z : paddleTop.position.z;
  ballZ = side === 'bot' ? pz - PD/2 - BR - 0.01 : pz + PD/2 + BR + 0.01;

  updateHUD();
  checkCombo();
  updateSpeedBar();

  // Flash raquette
  const paddle = side === 'bot' ? paddleBot : paddleTop;
  const origY = paddle.position.y;
  paddle.position.y = origY + 0.15;
  setTimeout(() => { paddle.position.y = origY; }, 80);
}

// ═══════════════════════════════════════
//  HUD / EFFETS
// ═══════════════════════════════════════
function updateHUD() {
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudBest').textContent  = bestScore;
}

const COMBOS_SET = new Set(COMBOS);
let flashTO;
function checkCombo() {
  if (COMBOS_SET.has(score)) {
    const el = document.getElementById('flash');
    el.textContent = score + ' !';
    el.style.opacity = '1';
    clearTimeout(flashTO);
    flashTO = setTimeout(() => { el.style.opacity = '0'; }, 700);
  }
}

function updateSpeedBar() {
  const pct = ((speedBase - SPEED_INIT) / (SPEED_MAX - SPEED_INIT)) * 100;
  const fill = document.getElementById('sfill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 70 ? 'var(--danger)' : 'var(--accent)';
}

// ═══════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════
function loop() {
  update();
  renderer.render(scene, camera);
  animId = requestAnimationFrame(loop);
}

// ═══════════════════════════════════════
//  START / END
// ═══════════════════════════════════════
function startGame() {
  showScreen(null);
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('sbar').classList.remove('hidden');
  gameActive = true;
  initGame();
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function endGame() {
  gameActive = false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('sbar').classList.add('hidden');

  let rec = false;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('pongGyro3DBest', bestScore);
    rec = true;
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('newRecord').textContent  = rec && score > 0 ? '★ Nouveau record !' : '';
  document.getElementById('homeBest').textContent   = bestScore;
  showScreen('over');
}

// ═══════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════
function showScreen(name) {
  document.getElementById('sHome').classList.add('hidden');
  document.getElementById('sOver').classList.add('hidden');
  if (name === 'home') document.getElementById('sHome').classList.remove('hidden');
  if (name === 'over') document.getElementById('sOver').classList.remove('hidden');
}

// iOS check
(function() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  if (isIOS && typeof DeviceOrientationEvent?.requestPermission === 'function') {
    document.getElementById('btnIOS').style.display = 'block';
  }
})();

document.getElementById('btnIOS').addEventListener('click', () => {
  requestGyro();
  const b = document.getElementById('btnIOS');
  b.textContent = 'Gyroscope autorisé';
  b.disabled = true;
});

document.getElementById('btnStart').addEventListener('click', () => {
  requestGyro();
  startGame();
});
document.getElementById('btnReplay').addEventListener('click', startGame);
document.getElementById('btnHome').addEventListener('click', () => {
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('sbar').classList.add('hidden');
  document.getElementById('homeBest').textContent = bestScore;
  showScreen('home');
});

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
document.getElementById('homeBest').textContent = bestScore;
showScreen('home');
